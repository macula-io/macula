<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Gradients (preserved from original) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1929"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>
    <linearGradient id="relayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="relay2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0EA5E9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F97316"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A855F7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#fff">
    Macula Mesh: Federated Relay Architecture
  </text>
  <text x="400" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    Nodes connect outbound to relays. Relays route pub/sub + RPC.
  </text>

  <!-- ============================================ -->
  <!-- RELAY A (center-left) -->
  <!-- ============================================ -->
  <g id="relay-a" transform="translate(290, 200)">
    <!-- Relay glow ring -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#F97316" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Relay body -->
    <rect x="-32" y="-24" width="64" height="48" rx="8" fill="#0C1929" stroke="#F97316" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#F97316" font-weight="bold">Relay A</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#F97316" opacity="0.7">Nuremberg</text>
  </g>

  <!-- ============================================ -->
  <!-- RELAY B (center-right) -->
  <!-- ============================================ -->
  <g id="relay-b" transform="translate(510, 200)">
    <!-- Relay glow ring -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <!-- Relay body -->
    <rect x="-32" y="-24" width="64" height="48" rx="8" fill="#0C1929" stroke="#A855F7" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#A855F7" font-weight="bold">Relay B</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#A855F7" opacity="0.7">Helsinki</text>
  </g>

  <!-- ============================================ -->
  <!-- FEDERATION LINK between relays -->
  <!-- ============================================ -->
  <line x1="328" y1="200" x2="478" y2="200" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <path id="fed-path-ab" d="M 328 200 L 478 200" fill="none"/>
  <!-- Animated federation packet A->B -->
  <circle r="4" fill="#10B981" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s">
      <mpath href="#fed-path-ab"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Federation label -->
  <rect x="374" y="183" width="52" height="14" rx="3" fill="#10B981" opacity="0.15"/>
  <text x="400" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" font-weight="bold">Peered</text>

  <!-- ============================================ -->
  <!-- NODES around Relay A -->
  <!-- ============================================ -->

  <!-- Node A1 (top-left) -->
  <g id="node-a1" transform="translate(100, 100)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node A1</text>
  </g>

  <!-- Node A2 (left) -->
  <g id="node-a2" transform="translate(80, 220)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node A2</text>
  </g>

  <!-- Node A3 (bottom-left) -->
  <g id="node-a3" transform="translate(130, 320)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node A3</text>
  </g>

  <!-- ============================================ -->
  <!-- OUTBOUND ARROWS: Nodes -> Relay A -->
  <!-- ============================================ -->

  <!-- A1 -> Relay A -->
  <path id="path-a1" d="M 116 110 L 264 186" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s">
      <mpath href="#path-a1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- A2 -> Relay A -->
  <path id="path-a2" d="M 96 218 L 258 202" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.5s">
      <mpath href="#path-a2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- A3 -> Relay A -->
  <path id="path-a3" d="M 144 308 L 268 218" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1s">
      <mpath href="#path-a3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ============================================ -->
  <!-- NODES around Relay B -->
  <!-- ============================================ -->

  <!-- Node B1 (top-right) -->
  <g id="node-b1" transform="translate(700, 100)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node B1</text>
  </g>

  <!-- Node B2 (right) -->
  <g id="node-b2" transform="translate(720, 220)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node B2</text>
  </g>

  <!-- Node B3 (bottom-right) -->
  <g id="node-b3" transform="translate(670, 320)">
    <circle cx="0" cy="0" r="16" fill="#0C1929" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#0EA5E9"/>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#94A3B8">Node B3</text>
  </g>

  <!-- ============================================ -->
  <!-- OUTBOUND ARROWS: Nodes -> Relay B -->
  <!-- ============================================ -->

  <!-- B1 -> Relay B -->
  <path id="path-b1" d="M 684 110 L 536 186" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.3s">
      <mpath href="#path-b1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- B2 -> Relay B -->
  <path id="path-b2" d="M 704 218 L 542 202" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#path-b2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- B3 -> Relay B -->
  <path id="path-b3" d="M 656 308 L 532 218" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowBlue)"/>
  <circle r="4" fill="#0EA5E9" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.3s">
      <mpath href="#path-b3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ============================================ -->
  <!-- "NO DIRECT" indicator (crossed-out line between nodes) -->
  <!-- ============================================ -->
  <g id="no-direct" opacity="0.35">
    <!-- Faint line between A1 and B1 -->
    <line x1="120" y1="100" x2="680" y2="100" stroke="#EF4444" stroke-width="1" stroke-dasharray="3,6"/>
    <!-- X mark in center -->
    <line x1="390" y1="90" x2="410" y2="110" stroke="#EF4444" stroke-width="2"/>
    <line x1="410" y1="90" x2="390" y2="110" stroke="#EF4444" stroke-width="2"/>
  </g>
  <text x="400" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#EF4444" opacity="0.5">No node-to-node connections</text>

  <!-- ============================================ -->
  <!-- Legend -->
  <!-- ============================================ -->
  <g id="legend" transform="translate(16, 355)">
    <rect x="0" y="0" width="770" height="36" rx="6" fill="#0C1929" stroke="#334155" stroke-width="1" opacity="0.9"/>

    <!-- Node -->
    <circle cx="20" cy="18" r="7" fill="#0C1929" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="3" fill="#0EA5E9"/>
    <text x="34" y="22" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Node (outbound QUIC)</text>

    <!-- Relay -->
    <rect x="170" y="10" width="16" height="16" rx="3" fill="#0C1929" stroke="#F97316" stroke-width="1.5"/>
    <text x="192" y="22" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Relay (routes pub/sub + RPC)</text>

    <!-- Federation -->
    <line x1="370" y1="18" x2="400" y2="18" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="408" y="22" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Federation (relay peering)</text>

    <!-- No direct -->
    <line x1="565" y1="14" x2="575" y2="22" stroke="#EF4444" stroke-width="1.5"/>
    <line x1="575" y1="14" x2="565" y2="22" stroke="#EF4444" stroke-width="1.5"/>
    <text x="583" y="22" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">No node-to-node links</text>
  </g>
</svg>
