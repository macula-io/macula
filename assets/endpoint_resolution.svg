<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Macula Endpoint Resolution</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#64748b">Identity (stable) vs Reachability (transient, multiple)</text>

  <!-- === LEFT: Identity Layer === -->
  <rect x="30" y="75" width="260" height="130" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Node Identity</text>
  <text x="160" y="115" text-anchor="middle" font-size="11" fill="#3b82f6">Stable, crypto-derived, never changes</text>

  <text x="50" y="140" font-size="12" fill="#1e3a5f" font-weight="600">Node ID</text>
  <text x="50" y="157" font-size="11" fill="#475569">= SHA-256(Ed25519 public key)</text>
  <text x="50" y="174" font-size="11" fill="#475569">= 32-byte binary (Kademlia key)</text>
  <text x="50" y="191" font-size="11" fill="#64748b" font-style="italic">Same node ID regardless of IP/location</text>

  <!-- === RIGHT: Reachability Layer === -->
  <rect x="320" y="75" width="550" height="130" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="595" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Reachable Endpoints</text>
  <text x="595" y="115" text-anchor="middle" font-size="11" fill="#16a34a">Transient, multiple per node, stored in DHT</text>

  <text x="340" y="140" font-size="12" fill="#14532d" font-weight="600">Endpoint List (per node)</text>
  <rect x="340" y="148" width="200" height="22" rx="3" fill="#dcfce7"/>
  <text x="350" y="164" font-size="11" fill="#166534">quic://host00.lab:9444</text>
  <text x="555" y="164" font-size="10" fill="#16a34a">LAN</text>
  <rect x="340" y="173" width="200" height="22" rx="3" fill="#dcfce7"/>
  <text x="350" y="189" font-size="11" fill="#166534">quic://83.102.45.7:9444</text>
  <text x="555" y="189" font-size="10" fill="#16a34a">Public</text>
  <rect x="580" y="148" width="270" height="22" rx="3" fill="#fef9c3"/>
  <text x="590" y="164" font-size="11" fill="#854d0e">relay://boot.macula.io/node-id</text>
  <text x="818" y="164" font-size="10" fill="#ca8a04">Fallback</text>
  <rect x="580" y="173" width="270" height="22" rx="3" fill="#fef9c3"/>
  <text x="590" y="189" font-size="11" fill="#854d0e">quic://[fd12::1]:9444</text>
  <text x="818" y="189" font-size="10" fill="#ca8a04">IPv6</text>

  <!-- === DHT Store === -->
  <rect x="150" y="230" width="600" height="55" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">DHT STORE (Kademlia)</text>
  <text x="450" y="270" text-anchor="middle" font-size="11" fill="#6d28d9">Key: SHA-256(topic) -> Value: #{node_id, endpoints: [...], ttl}</text>

  <!-- Arrows to DHT -->
  <line x1="160" y1="205" x2="300" y2="235" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="595" y1="205" x2="595" y2="230" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === Connection Race === -->
  <rect x="80" y="320" width="740" height="200" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">Connect Race (try all endpoints simultaneously)</text>

  <!-- Peer A -->
  <rect x="110" y="365" width="120" height="45" rx="6" fill="#fed7aa" stroke="#ea580c"/>
  <text x="170" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Peer A</text>
  <text x="170" y="400" text-anchor="middle" font-size="10" fill="#c2410c">wants to reach B</text>

  <!-- Race arrows -->
  <line x1="230" y1="375" x2="460" y2="375" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <text x="345" y="368" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">1. LAN direct (fastest)</text>

  <line x1="230" y1="395" x2="460" y2="395" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" stroke-dasharray="6,3"/>
  <text x="345" y="412" text-anchor="middle" font-size="10" fill="#ea580c">2. Public IP direct</text>

  <line x1="230" y1="430" x2="350" y2="460" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>
  <text x="260" y="455" font-size="10" fill="#dc2626">3. Via relay</text>

  <!-- Peer B (multiple endpoints) -->
  <rect x="460" y="360" width="140" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="530" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Peer B</text>
  <text x="530" y="397" text-anchor="middle" font-size="10" fill="#166534">host00.lab:9444</text>

  <!-- Relay node -->
  <rect x="350" y="450" width="140" height="40" rx="6" fill="#fef3c7" stroke="#ca8a04"/>
  <text x="420" y="475" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Relay (bootstrap)</text>
  <line x1="490" y1="460" x2="530" y2="410" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>

  <!-- First wins -->
  <rect x="630" y="370" width="160" height="55" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="710" y="392" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">First response wins</text>
  <text x="710" y="410" text-anchor="middle" font-size="10" fill="#166534">Cancel other attempts</text>

  <!-- === Address Learning === -->
  <rect x="80" y="545" width="740" height="110" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="450" y="570" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">Address Learning (Observed Address Protocol)</text>

  <!-- Flow -->
  <rect x="110" y="585" width="130" height="40" rx="4" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="175" y="600" text-anchor="middle" font-size="11" fill="#0c4a6e">Node behind NAT</text>
  <text x="175" y="615" text-anchor="middle" font-size="10" fill="#0369a1">knows: 192.168.1.5</text>

  <line x1="240" y1="605" x2="330" y2="605" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="285" y="598" text-anchor="middle" font-size="9" fill="#0284c7">connects</text>

  <rect x="330" y="585" width="130" height="40" rx="4" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="395" y="600" text-anchor="middle" font-size="11" fill="#0c4a6e">Public peer</text>
  <text x="395" y="615" text-anchor="middle" font-size="10" fill="#0369a1">sees: 83.102.45.7</text>

  <line x1="460" y1="605" x2="550" y2="605" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="598" text-anchor="middle" font-size="9" fill="#0284c7">reports back</text>

  <rect x="550" y="585" width="170" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="635" y="600" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Node learns public IP</text>
  <text x="635" y="615" text-anchor="middle" font-size="10" fill="#2563eb">adds quic://83.102.45.7:9444</text>

  <!-- Legend -->
  <rect x="30" y="545" width="40" height="3" fill="#16a34a"/>
  <text x="30" y="557" font-size="9" fill="#64748b">Direct (fast)</text>
  <rect x="30" y="565" width="40" height="3" fill="#ea580c"/>
  <text x="30" y="577" font-size="9" fill="#64748b">NAT punch</text>
  <rect x="30" y="585" width="40" height="3" fill="#dc2626"/>
  <text x="30" y="597" font-size="9" fill="#64748b">Relay (last resort)</text>
</svg>
