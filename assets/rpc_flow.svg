<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
    <marker id="arr-adv" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-call" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-reply" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="6" fill="#f8fafc"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="38" fill="url(#headerGrad)"/>
  <text x="400" y="25" text-anchor="middle" fill="white" font-family="system-ui" font-size="15" font-weight="bold">Relay-Routed RPC with DHT Service Discovery</text>

  <!-- Legend -->
  <rect x="610" y="46" width="178" height="72" rx="5" fill="white" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="620" y="62" font-family="system-ui" font-size="9" font-weight="600" fill="#374151">Legend</text>
  <line x1="620" y1="76" x2="648" y2="76" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-adv)"/>
  <text x="656" y="79" font-family="system-ui" font-size="9" fill="#6b7280">Advertise / DHT</text>
  <line x1="620" y1="92" x2="648" y2="92" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-call)"/>
  <text x="656" y="95" font-family="system-ui" font-size="9" fill="#6b7280">RPC Call</text>
  <line x1="620" y1="108" x2="648" y2="108" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-reply)"/>
  <text x="656" y="111" font-family="system-ui" font-size="9" fill="#6b7280">RPC Reply</text>

  <!-- ==================== NODE A (Caller) ==================== -->
  <rect x="30" y="60" width="130" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="82" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#1d4ed8">Node A</text>
  <text x="95" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b7280">Caller</text>

  <!-- ==================== RELAY (Center) ==================== -->
  <rect x="290" y="48" width="220" height="76" rx="10" fill="#fef9c3" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="72" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#b45309">Relay</text>
  <rect x="340" y="82" width="120" height="28" rx="4" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="500" fill="#6d28d9">Kademlia DHT</text>

  <!-- ==================== NODE B (Provider) ==================== -->
  <rect x="640" y="60" width="130" height="50" rx="8" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="705" y="82" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#c2410c">Node B</text>
  <text x="705" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6b7280">Provider</text>

  <!-- ==================== FLOW 1: Advertise ==================== -->
  <!-- Node B advertises procedure to Relay DHT -->
  <text x="400" y="143" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#374151">1. Advertise Procedure</text>

  <line x1="640" y1="152" x2="512" y2="152" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-adv)"/>
  <text x="576" y="148" text-anchor="middle" font-family="system-ui" font-size="8" fill="#7c3aed">advertise("math.add")</text>

  <text x="400" y="164" text-anchor="middle" font-family="system-ui" font-size="8" fill="#6b7280">Relay stores SHA256("math.add") in DHT with Node B endpoint</text>

  <!-- ==================== FLOW 2: Call ==================== -->
  <text x="400" y="186" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#374151">2. RPC Call (Relay-Routed)</text>

  <!-- Step A: Node A sends call to Relay -->
  <line x1="160" y1="200" x2="288" y2="200" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-call)"/>
  <text x="224" y="196" text-anchor="middle" font-family="system-ui" font-size="8" fill="#1d4ed8">call("math.add", [2,3])</text>

  <!-- Step B: Relay does DHT lookup and forwards to Node B -->
  <rect x="330" y="193" width="140" height="16" rx="3" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="400" y="204" text-anchor="middle" font-family="system-ui" font-size="7" font-weight="500" fill="#6d28d9">DHT lookup + route</text>

  <line x1="512" y1="200" x2="638" y2="200" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-call)"/>
  <text x="576" y="196" text-anchor="middle" font-family="system-ui" font-size="8" fill="#1d4ed8">forward to Node B</text>

  <!-- ==================== FLOW 3: Reply ==================== -->
  <text x="400" y="228" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#374151">3. RPC Reply (Relay-Routed)</text>

  <!-- Step C: Node B replies through Relay -->
  <line x1="640" y1="242" x2="512" y2="242" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-reply)"/>
  <text x="576" y="238" text-anchor="middle" font-family="system-ui" font-size="8" fill="#059669">result: 5</text>

  <!-- Step D: Relay forwards reply to Node A -->
  <line x1="288" y1="242" x2="162" y2="242" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-reply)"/>
  <text x="224" y="238" text-anchor="middle" font-family="system-ui" font-size="8" fill="#059669">result: 5</text>

  <rect x="334" y="234" width="132" height="16" rx="3" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui" font-size="7" font-weight="500" fill="#047857">relay back to caller</text>

  <!-- ==================== Footer note ==================== -->
  <text x="400" y="276" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">Nodes never connect directly. All traffic flows through the relay mesh via QUIC.</text>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#9ca3af">Relay uses Kademlia DHT for procedure discovery and endpoint resolution.</text>
</svg>
