name: Build Documentation PDFs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-extra texlive-latex-extra librsvg2-bin

      - name: Build PDFs
        run: bash scripts/build-docs-pdf.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macula-docs-pdfs
          path: dist/*.pdf

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf
