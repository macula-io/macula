name: Build Quinn NIF

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build glibc NIF
        run: |
          cd native/macula_quic
          cargo build --release
          cp target/release/libmacula_quic.so ../../libmacula_quic-linux-x86_64.so

      - name: Generate glibc checksum
        run: sha256sum libmacula_quic-linux-x86_64.so > libmacula_quic-linux-x86_64.so.sha256

      - name: Build musl NIF (Alpine container)
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work/native/macula_quic \
            alpine:3.22 sh -c '
              apk add --no-cache rust cargo build-base &&
              cargo build --release &&
              cp target/release/libmacula_quic.so /work/libmacula_quic-linux-musl-x86_64.so
            '

      - name: Generate musl checksum
        run: sha256sum libmacula_quic-linux-musl-x86_64.so > libmacula_quic-linux-musl-x86_64.so.sha256

      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libmacula_quic-linux-x86_64.so
            libmacula_quic-linux-x86_64.so.sha256
            libmacula_quic-linux-musl-x86_64.so
            libmacula_quic-linux-musl-x86_64.so.sha256

      - name: Upload artifact (for workflow_dispatch)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: macula-quic-nifs
          path: |
            libmacula_quic-*.so
            libmacula_quic-*.sha256
